global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'jarvis'
    static_configs:
      - targets: ['localhost:8765']
    metrics_path: '/metrics'

  - job_name: 'ollama'
    static_configs:
      - targets: ['localhost:11434']

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']