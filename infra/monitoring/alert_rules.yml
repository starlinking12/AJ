groups:
  - name: jarvis_alerts
    rules:
      - alert: HighCPUUsage
        expr: jarvis_cpu_usage_percent > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "J.A.R.V.I.S. CPU usage is above 90% for 5 minutes."

      - alert: HighRAMUsage
        expr: jarvis_ram_usage_percent > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High RAM usage detected"
          description: "J.A.R.V.I.S. RAM usage is above 90%."

      - alert: VoicePipelineDown
        expr: jarvis_voice_pipeline_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Voice pipeline is down"
          description: "J.A.R.V.I.S. voice pipeline is not responding."

      - alert: LLMTimeout
        expr: jarvis_llm_response_time_ms > 10000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM response time high"
          description: "J.A.R.V.I.S. LLM is taking over 10 seconds to respond."